name: CI - Ong.Api.Campaigns

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  DOTNET_VERSION: '10.0.x'

jobs:
  build-and-test:
    name: 🔨 Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: ⚙️ Configurar .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          dotnet-quality: preview

      - name: 📦 Restore
        run: dotnet restore Ong.Api.Campaigns.sln

      - name: 🏗️ Build
        run: dotnet build Ong.Api.Campaigns.sln --configuration Release --no-restore

